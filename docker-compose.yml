version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: zawjia-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - zawjia-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zawjia-redis
    restart: unless-stopped
    networks:
      - zawjia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zawjia-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/Zawjia
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://72.62.71.97:3001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zawjia-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://72.62.71.97:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://72.62.71.97:5000
    container_name: zawjia-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://72.62.71.97:5000
    depends_on:
      - backend
    networks:
      - zawjia-network

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  uploads_data:

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  zawjia-network:
    driver: bridge
